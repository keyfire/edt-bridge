# Publish the edt-bridge bundle jar as a GitHub release asset when a version tag is pushed.
#
# Why the jar is NOT compiled here: building the bundle requires the 1C:EDT SDK bundles
# (com._1c.g5.v8.*), which are proprietary and cannot be redistributed or downloaded
# anonymously - so a hosted runner has no legal way to obtain the compile classpath.
# Instead, the maintainer builds locally against their own EDT install
# (scripts/build-nomaven.ps1 -Dist / scripts/build-nomaven.sh --dist), commits the jar under dist/,
# and tags the commit; this workflow attaches that jar + its SHA256 to the release.
# (If a self-hosted runner with EDT installed ever exists, a build job can replace the
# dist/ pickup - the rest of the workflow stays the same.)
#
# Release flow:
#   powershell -File scripts/build-nomaven.ps1 -Dist       (or ./scripts/build-nomaven.sh --dist)
#   git add dist/ && git commit -m "Release vX.Y.Z"
#   git tag vX.Y.Z && git push origin main vX.Y.Z
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # The jar itself cannot be tested here (no EDT SDK on a hosted runner), but a release is one
  # event: if the wrapper's suite is red, the tag should not turn into a release at all.
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick the bundle jar from dist/
        id: jar
        run: |
          jar=$(ls dist/io.github.keyfire.edtbridge_*.jar 2>/dev/null | sort | tail -n 1)
          if [ -z "$jar" ]; then
            echo "::error::No dist/io.github.keyfire.edtbridge_*.jar in the tagged commit." \
                 "Build locally with scripts/build-nomaven.ps1 -Dist (or scripts/build-nomaven.sh --dist)," \
                 "commit dist/ and re-tag."
            exit 1
          fi
          echo "jar=$jar" >> "$GITHUB_OUTPUT"
          sha256sum "$jar" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create the release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.jar.outputs.jar }}
            SHA256SUMS.txt
          generate_release_notes: true
